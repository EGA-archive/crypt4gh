name: Publish wheels


on:
  push:
    tags:
      - v[1-9]+.*
      - test-[0-9]+.*

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      matrix:
        include:
          - os: linux-intel
            runs-on: ubuntu-latest
          - os: linux-arm
            runs-on: ubuntu-24.04-arm
          - os: macos-intel
            # macos-15-intel is the last x86_64 runner
            runs-on: macos-15-intel
          - os: macos-arm
            # macos-14+ (including latest) are ARM64 runners
            runs-on: macos-latest
          # - os: windows-intel
          #   runs-on: windows-latest
          # - os: windows-arm
          #   runs-on: windows-11-arm

        # build: ["cp39-* cp310-* cp311-* cp312-* cp313-* cp314-*"]

    steps:
      - name: Checkout crypt4gh (with the bundled libsodium)
        uses: actions/checkout@v6
        with:
          submodules: recursive
          persist-credentials: false

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1
        env:
          CIBW_PLATFORM: 'auto'
          CIBW_ARCHS: 'auto' # native
          CIBW_BUILD_VERBOSITY: 1
        # with:
        #   package-dir: .
        #   output-dir: wheelhouse
        #   config-file: "{package}/pyproject.toml"

      - uses: actions/upload-artifact@v7
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl


  build_sdist:
    runs-on: ubuntu-latest
    env:
      job_python_version: "3.14"

    steps:
      - name: Checkout crypt4gh (with the bundled libsodium)
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Python ${{ env.job_python_version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.job_python_version }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create source distribution
        run:  python setup.py sdist --owner=root --group=root

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/crypt4gh-*.tar.gz


  publish-to-testpypi:
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'test-')
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest

    environment:
      name: testpypi
      url: https://test.pypi.org/p/crypt4gh

    permissions:
      id-token: write

    steps:
      - name: Get artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: dist

      - name: Publish distribution to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-to-pypi:
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/crypt4gh

    permissions:
      id-token: write

    steps:
      - name: Get artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: dist

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
